export default "\n<ion-content>\n\n        <ion-slides pager=\"true\" dir=\"ltr\" options=\"slideOpts\">\n          <ion-slide class=\"bg-profile\">\n            <div class=\"ion-padding w100\">\n              <img src=\"assets/img/ionbooking-ico.png\" alt=\"ionBooking\" class=\"slide-image animated fadeInDown slow\">\n              <h2 class=\"ion-margin-bottom slide-title text-white\">Welcome to iKOE</h2>\n\n              <hr>\n\n              <ion-button expand=\"full\" shape=\"round\" color=\"secondary\" class=\"ion-margin-top\" (click)=\"openLoginPage()\">\n                Sign In / Sign Up\n              </ion-button>\n              <ion-button expand=\"full\" shape=\"round\" color=\"dark\" class=\"ion-margin-top\" (click)=\"openHomePage()\">\n                <!-- routerLink=\"/home\" -->\n                Get Started\n              </ion-button>\n            </div>\n\n          </ion-slide>\n        </ion-slides>\n\n</ion-content>"
